name: Django CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    env:
      # Pulled from GitHub Secrets / Variables. Set them on the repo:
      #   gh secret set TU_API_APP_KEY -R arm280747/CN334
      #   gh variable set TU_API_URL --body "https://restapi.tu.ac.th/api/v1/auth/Ad/verify" -R arm280747/CN334
      TU_API_APP_KEY: ${{ secrets.TU_API_APP_KEY }}
      TU_API_URL: ${{ vars.TU_API_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install django requests

      - name: Django system check
        working-directory: TUBooking
        run: python manage.py check

      - name: Run tests
        working-directory: TUBooking
        run: python manage.py test
