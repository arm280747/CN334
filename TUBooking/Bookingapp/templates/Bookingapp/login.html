{% extends "base.html" %}
{% load static %}

{% block title %}Login | TU Booking{% endblock %}

{% block content %}
<div class="tu-login-wrap">
    <div class="tu-login-card">

        <div class="tu-login-logo">
            <div class="tu-login-logo-dot"></div>
            <span>TU Booking</span>
        </div>
        <p class="tu-login-subtitle">Sign in to manage your room reservations</p>

        <form method="POST">
            {% csrf_token %}
            <table class="tu-login-table" style="width:100%">
                {{ form.as_table }}
            </table>
            <button class="btn-tu-primary" style="width:100%; justify-content: center; margin-top: 8px;" type="submit">
                Sign In &rarr;
            </button>
        </form>

        <p style="text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--muted);">
            Don't have an account?
            <a href="{% url 'register' %}" style="font-weight: 600;">Create one</a>
        </p>

    </div>
</div>
{% endblock %}
