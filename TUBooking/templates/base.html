{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TU Booking{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    {% block style %}{% endblock %}
</head>
<body>

    <!-- Top Navbar -->
    <nav class="tu-navbar">
        <div class="tu-navbar-inner">
            <a class="tu-brand" href="{% block homeurl %}{% url 'home' %}{% endblock %}">
                <span class="tu-brand-dot"></span>
                TU Booking
            </a>

            <ul class="tu-nav-links">
                <li><a href="{% url 'home' %}" class="tu-nav-link {% block nav_home %}{% endblock %}">Dashboard</a></li>
                <li><a href="{% url 'booking' %}" class="tu-nav-link {% block nav_rooms %}{% endblock %}">Rooms</a></li>
                <li><a href="{% url 'booked' %}" class="tu-nav-link {% block nav_booked %}{% endblock %}">My Bookings</a></li>
            </ul>

            <div class="tu-nav-right">
                {% block nav_user %}{% endblock %}
                {% block nav_logout %}{% endblock %}
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <main class="tu-main">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
